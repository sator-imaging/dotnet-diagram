@startuml
skinparam BackgroundColor F9F9F9
skinparam shadowing false
skinparam RoundCorner 7
skinparam ArrowColor 191919
skinparam FontColor 191919
skinparam SequenceLifeLineBorderColor 393939
skinparam SequenceGroupHeaderFontColor 191919
skinparam SequenceGroupFontColor 393939
skinparam SequenceGroupBorderColor 393939
skinparam SequenceGroupBorderThickness 1

skinparam sequenceDivider {
    BorderColor 191919
    BorderThickness 1
    FontColor 191919
}

skinparam participant {
    BackgroundColor E55756
    BorderColor 191919
    FontColor F9F9F9
    BorderThickness 1.5
}

skinparam database {
    BackgroundColor A4DBD8
    BorderColor 191919
    FontColor 191919
}

skinparam entity {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam note {
    BackgroundColor e5e5e5
    BorderColor 191919
    FontColor 191919
    BorderThickness 1.5
}

skinparam actor {
    BackgroundColor 191919
    BorderColor 191919
    FontColor 191919
}

skinparam boundary {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam control {
    BackgroundColor EFBABC
    BorderColor 191919
    FontColor 191919
}

skinparam collections {
    BackgroundColor E55756
    BorderColor 191919
    FontColor 191919
    BorderThickness 1.5
}

skinparam queue {
    BackgroundColor E55756
    BorderColor 191919
    FontColor FFF
    BorderThickness 1.5
}

skinparam class {
    BackgroundColor F1F1F1
    BorderColor BBBBBB
}
left to right direction
class ClassA {
}
class Type1 {
    + value1 : int <<get>> <<set>>
}
class Type2 {
    + string1 : string <<get>> <<set>>
}
class "IList`1"<T> {
}
ClassA o-> "Strings<string>" "IList`1"
ClassA - -> "Prop1" Type1
ClassA - -> "field1" Type2
Type2 - -> "Prop2" ExternalType
@enduml

